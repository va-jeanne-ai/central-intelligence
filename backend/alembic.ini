# Alembic configuration file
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migrations directory, relative to this file
script_location = alembic

# Template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# The timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements
# timezone =

# Max length of characters to apply to the "truncated_slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory
# sourceless = false

# Version path separator; used when a single Alembic revision has multiple
# parent revisions and the paths are represented as a sequence
# version_path_separator = os  # Use os.pathsep. Default configuration
# used for new projects.
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# DATABASE_URL is read from the environment via env.py — no hardcoded URL here.
# If you run alembic directly (not via the app) set DATABASE_URL in your shell or .env.
sqlalchemy.url = postgresql+asyncpg://localhost:5432/centralintelligence

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
